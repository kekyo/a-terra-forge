{{
set accentColor (cond primaryColor? primaryColor '#2f81f7')
set fontFamily (cond fontList? (join ', ' fontList) 'Noto Sans, sans-serif')
set accentCircleFill (concat 'rgba(' (toCssRgb accentColor '47, 129, 247') ', 0.12)')
}}
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none" role="img" aria-labelledby="timeline-title timeline-desc">
  <title id="timeline-title">{{escapeXml siteName}}</title>
  <desc id="timeline-desc">{{escapeXml siteDescription}}</desc>
  <defs>
    <linearGradient id="timeline-background-dark" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1117" />
      <stop offset="1" stop-color="#161b22" />
    </linearGradient>
    <linearGradient id="timeline-accent-dark" x1="72" y1="0" x2="952" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="{{accentColor}}" />
      <stop offset="1" stop-color="{{accentColor}}" stop-opacity="0.72" />
    </linearGradient>
    <clipPath id="timeline-icon-clip-dark">
      <rect x="988" y="48" width="140" height="140" rx="28" />
    </clipPath>
    <clipPath id="timeline-frame-clip-dark">
      <rect x="0" y="0" width="1200" height="630" rx="16" />
    </clipPath>
  </defs>

  <rect x="1" y="1" width="1198" height="628" rx="24" fill="#0d1117" stroke-width="0" />
  <g clip-path="url(#timeline-frame-clip-dark)">
    <rect x="60" y="60" width="1080" height="510" rx="16" fill="rgba(255,255,255,0.02)" />
    <rect x="72" y="100" width="850" height="8" rx="4" fill="url(#timeline-accent-dark)" />
    <circle cx="1114" cy="510" r="168" fill="{{accentCircleFill}}" />

    {{if siteIconAssetPath?}}
    <rect x="988" y="48" width="140" height="140" rx="28" fill="#161b22" stroke-width="0" />
    <image href="{{toRelativePath siteIconAssetPath}}" x="988" y="48" width="140" height="140" preserveAspectRatio="xMidYMid slice" clip-path="url(#timeline-icon-clip-dark)" />
    {{end}}

    <text x="72" y="188" fill="#7d8590" font-family="{{escapeXml fontFamily}}" font-size="24" font-weight="700">{{escapeXml (getMessage 'timeline' 'Timeline')}}</text>
    <text x="72" y="280" fill="#f0f6fc" font-family="{{escapeXml fontFamily}}" font-size="72" font-weight="800">{{svgTextSpans siteName 26 2 72 86}}</text>
    <text x="72" y="430" fill="#c9d1d9" font-family="{{escapeXml fontFamily}}" font-size="34">{{svgTextSpans siteDescription 52 3 72 46}}</text>

    <text x="72" y="550" fill="#8b949e" font-family="{{escapeXml fontFamily}}" font-size="22">{{escapeXml siteName}}</text>
    <text x="300" y="550" fill="#8b949e" font-family="{{escapeXml fontFamily}}" font-size="22">{{escapeXml baseUrl}}</text>
  </g>
</svg>
